function shade(hex, f) {
  var n = parseInt(hex.slice(1), 16);
  var r = Math.max(0, Math.min(255, Math.round(((n >> 16) & 255) * f)));
  var g = Math.max(0, Math.min(255, Math.round(((n >> 8) & 255) * f)));
  var b = Math.max(0, Math.min(255, Math.round((n & 255) * f)));
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function palFor(c, soft) {
  var p = {
    O: '#1c1c26',
    S: c.skin, s: shade(c.skin, 0.78), K: shade(c.skin, 1.08),
    H: c.hair, h: shade(c.hair, 0.66), G: c.hairShine, b: shade(c.hair, 0.66),
    W: '#ffffff', E: '#20203a', M: '#8a4a3c',
    T: c.top, t: shade(c.top, 0.72), U: shade(c.top, 1.3),
    L: c.pants, l: shade(c.pants, 0.72),
    F: c.shoes, f: shade(c.shoes, 0.6),
    C: '#f2b09a'
  };
  if (soft) { // the no-black-outline look: edges are darker versions of each material
    p.O = null;
    p.Y = shade(c.skin, 0.62);   // skin edge
    p.J = shade(c.hair, 0.55);   // hair edge
    p.X = shade(c.top, 0.5);     // top edge
    p.Z = shade(c.pants, 0.5);   // pants edge
    p.Q = shade(c.shoes, 0.45);  // shoe edge
  }
  return p;
}

// ---------------------------------------------------------------- render ---
var out = document.getElementById('out');
var warnings = [];
var ZOOM = 8;

function paintRows(rows, pal) {
  var c = document.createElement('canvas');
  c.width = 16; c.height = rows.length;
  var x2 = c.getContext('2d');
  rows.forEach(function (row, y) {
    if (row.length !== 16) warnings.push('row ' + y + ' has ' + row.length + ' chars: "' + row + '"');
    for (var x = 0; x < 16; x++) {
      var ch = row[x];
      if (!ch || ch === '.') continue;
      var col = pal[ch];
      if (col === undefined) warnings.push('unknown symbol "' + ch + '" at ' + x + ',' + y);
      if (!col) continue;
      x2.fillStyle = col;
      x2.fillRect(x, y, 1, 1);
    }
  });
  return c;
}

function cell(canvas, label) {
  var d = document.createElement('div');
  d.className = 'cell';
  var big = document.createElement('canvas');
  big.width = canvas.width * ZOOM; big.height = canvas.height * ZOOM;
  var bc = big.getContext('2d');
  bc.imageSmoothingEnabled = false;
  bc.drawImage(canvas, 0, 0, big.width, big.height);
  d.appendChild(big);
  // ...and at roughly the size it appears in the game window
  var small = document.createElement('canvas');
  small.width = canvas.width * 3; small.height = canvas.height * 3;
  var sc = small.getContext('2d');
  sc.imageSmoothingEnabled = false;
  sc.drawImage(canvas, 0, 0, small.width, small.height);
  small.style.display = 'block';
  small.style.margin = '6px auto 0';
  d.appendChild(small);
  var l = document.createElement('div');
  l.className = 'label';
  l.textContent = label;
  d.appendChild(l);
  return d;
}

function renderRow(title, person, colors) {
  var h = document.createElement('h2');
  h.textContent = title;
  out.appendChild(h);
  var row = document.createElement('div');
  row.className = 'row';
  // today's sprite from the real game code
  var cfg = G.Sprites.cfgFrom(person === 'man'
    ? { style: 0, skin: 0, hairColor: 1, outfit: 4, glasses: false }
    : { style: 1, skin: 0, hairColor: 6, outfit: 10, glasses: false, shirtColor: 6 });
  var frames = G.Sprites.makeAdult(cfg);
  row.appendChild(cell(frames.down[0], 'TODAY\n(the potato)'));
  DESIGNS.forEach(function (d) {
    row.appendChild(cell(paintRows(d[person], palFor(colors, d.soft)), d.name + '\n' + d.blurb));
  });
  out.appendChild(row);
}

document.getElementById('warnings').textContent = warnings.length
  ? 'TEMPLATE WARNINGS:\n' + warnings.join('\n') : '';
